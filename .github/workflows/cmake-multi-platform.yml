# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      matrix:
        include:
          - os: windows-latest
            cmake_preset: cl-x64-debug
            compiler: cl
            cxx_flags: ""
            linker_flags: ""
          - os: windows-latest
            cmake_preset: cl-x64-release
            compiler: cl
            cxx_flags: ""
            linker_flags: ""
          - os: ubuntu-latest
            cmake_preset: clang-x64-release
            compiler: llvm-22.0.0
            cxx_flags: "-stdlib=libc++"
            linker_flags: "-stdlib=libc++ -lc++ -lc++abi"
          - os: ubuntu-latest
            cmake_preset: gcc-x64-release
            compiler: gcc-16
            cxx_flags: "-fmodules --compile-std-module"
            linker_flags: "-fmodules"

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
        
    - name: Set reusable strings
      # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/out/build/${{ matrix.cmake_preset }}" >> "$GITHUB_OUTPUT"

    - name: Setup C++ environment
      uses: aminya/setup-cpp@v1
      with:
        compiler: ${{ matrix.compiler }}
        cmake: 4.3.0
        ninja: 1.13.2
        vcvarsall: ${{ contains(matrix.os, 'windows' )}}


    # - name: Install dependencies (Ubuntu)
    #   if: matrix.os == 'ubuntu-latest'
    #   run: |
    #     sudo apt-get update
    #     sudo apt-get install -y libgl1-mesa-dev libxi-dev libxcursor-dev

    - name: Configure CMake
      run: >
        cmake --preset ${{ matrix.cmake_preset }}
        -DCMAKE_CXX_FLAGS="${{ matrix.cxx_flags }}"
        -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.linker_flags }}"
        -DCMAKE_SHARED_LINKER_FLAGS="${{ matrix.linker_flags }}"
        -B ${{ steps.strings.outputs.build-output-dir }}
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }}

#    - name: Test
#      working-directory: ${{ steps.strings.outputs.build-output-dir }}
#      # Execute tests defined by the CMake configuration. --build-config may be needed because the default Windows generator is a multi-config generator (Visual Studio generator).
#      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
#      run: ctest

    - name: Upload artifacts (Windows)
      if : matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: windows-binaries-${{ matrix.cmake_preset }}
        path: |
            ${{ steps.strings.outputs.build-output-dir }}/src
            !${{ steps.strings.outputs.build-output-dir }}/src/cmake*